<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instinct Edu</title>

<style>
/* ====== ESTILO GENERAL ====== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-color: #1a1a1b;
    color: white;
}

/* ====== REGISTRO ====== */
#pantallaRegistro {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.registro-card {
    background: #242424;
    padding: 40px;
    border-radius: 15px;
    width: 400px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    background: #1a1a1b;
    border: 1px solid #444;
    color: white;
}

button {
    padding: 10px;
    background: #ff4757;
    border: none;
    color: white;
    cursor: pointer;
}

/* ====== DASHBOARD ====== */
#dashboard {
    display: none;
}

.dashboard-container { display: flex; height: 100vh; }

.sidebar {
    width: 280px;
    background-color: #121212;
    padding: 25px;
}

.main-content { flex: 1; padding: 40px; }

table { width: 100%; border-collapse: collapse; }
td, th { padding: 15px; border-bottom: 1px solid #333; }

.aprobado { color: #4cd137; }
.reprobado { color: #ff4757; }

#seccionMaestro { display: none; }
#contenedorBuscador { display: none; }
</style>
</head>

<body>

<!-- ===== REGISTRO ===== -->
<div id="pantallaRegistro">
<div class="registro-card">

<h2>Crear Cuenta</h2>

<form id="formRegistro">

<input type="text" id="regNombre" placeholder="Nombre" required>

<select id="regRol" onchange="verificarRol()">
<option value="estudiante">Estudiante</option>
<option value="maestro">Maestro</option>
</select>

<div id="campoAsignatura" style="display:none;">
<input type="text" id="regMateria" placeholder="Asignatura">
</div>

<input type="password" id="regPass" placeholder="Contraseña" required>

<button type="submit">Registrarse</button>

</form>
</div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

<div class="dashboard-container">

<aside class="sidebar">
<h2>Instinct Edu</h2>

<div id="seccionMaestro">
<input type="text" id="materiaNombre" disabled>
<input type="number" id="materiaNota" placeholder="0-100">
<button onclick="guardarNuevaNota()">Publicar</button>
</div>

<p id="nombreUser"></p>
<p id="rolTag"></p>

<button onclick="cerrarSesion()">Cerrar Sesión</button>

</aside>

<main class="main-content">

<input type="text" id="inputBusqueda" placeholder="Buscar..." oninput="filtrarNotas()">

<table>
<thead>
<tr>
<th>Materia</th>
<th>Nota</th>
<th>Estado</th>
<th>Profesor</th>
</tr>
</thead>

<tbody id="tabla-cuerpo"></tbody>
</table>

</main>

</div>
</div>

<script>
// ===== CONTROL INICIAL =====
document.addEventListener("DOMContentLoaded", () => {
    const usuario = JSON.parse(localStorage.getItem('usuarioRegistrado'));

    if (usuario) {
        mostrarDashboard(usuario);
    }
});

// ===== REGISTRO =====
function verificarRol() {
    const rol = document.getElementById('regRol').value;
    document.getElementById('campoAsignatura').style.display =
        (rol === "maestro") ? "block" : "none";
}

document.getElementById('formRegistro').addEventListener('submit', function(e) {
    e.preventDefault();

    const usuario = {
        nombre: document.getElementById('regNombre').value,
        rol: document.getElementById('regRol').value,
        asignatura: document.getElementById('regMateria').value
    };

    localStorage.setItem('usuarioRegistrado', JSON.stringify(usuario));
    mostrarDashboard(usuario);
});

// ===== DASHBOARD =====
function mostrarDashboard(usuario) {
    document.getElementById('pantallaRegistro').style.display = "none";
    document.getElementById('dashboard').style.display = "block";

    document.getElementById('nombreUser').innerText = usuario.nombre;
    document.getElementById('rolTag').innerText = usuario.rol;

    if (usuario.rol === "maestro") {
        document.getElementById('seccionMaestro').style.display = "block";
        document.getElementById('materiaNombre').value = usuario.asignatura;
    } else {
        document.getElementById('contenedorBuscador').style.display = "block";
    }

    dibujarTabla();
}

function guardarNuevaNota() {
    const usuario = JSON.parse(localStorage.getItem('usuarioRegistrado'));
    const nota = parseInt(document.getElementById('materiaNota').value);

    if (isNaN(nota) || nota < 0 || nota > 100) {
        alert("Nota inválida");
        return;
    }

    let notas = JSON.parse(localStorage.getItem('notasSistema')) || [];

    notas.push({
        materia: usuario.asignatura,
        nota: nota,
        maestro: usuario.nombre
    });

    localStorage.setItem('notasSistema', JSON.stringify(notas));

    document.getElementById('materiaNota').value = "";
    dibujarTabla();
}

function filtrarNotas() {
    const filtro = document.getElementById('inputBusqueda').value.toLowerCase();
    dibujarTabla(filtro);
}

function dibujarTabla(filtro = "") {
    const tabla = document.getElementById('tabla-cuerpo');
    const notas = JSON.parse(localStorage.getItem('notasSistema')) || [];

    tabla.innerHTML = "";

    const filtradas = notas.filter(n =>
        (n.materia || "").toLowerCase().includes(filtro)
    );

    if (filtradas.length === 0) {
        tabla.innerHTML = "<tr><td colspan='4'>No hay datos</td></tr>";
        return;
    }

    filtradas.forEach(n => {
        let estado = n.nota >= 70 ? "APROBADO" : "REPROBADO";
        let clase = n.nota >= 70 ? "aprobado" : "reprobado";

        tabla.innerHTML += `
        <tr>
            <td>${n.materia}</td>
            <td>${n.nota}</td>
            <td class="${clase}">${estado}</td>
            <td>${n.maestro}</td>
        </tr>`;
    });
}

function cerrarSesion() {
    localStorage.removeItem('usuarioRegistrado');
    location.reload();
}
</script>

</body>
</html>
